# Going Cooperative global replication settings.
# Session role, host address, and port are selected in the multiplayer UI.
enabled=false
multiplayerMenu=true
# Multiplayer menu implementation: v2 (redesigned) or classic (original rollback).
ui=v2
# Gated single-flow menu (v3, default): one HOST/JOIN choice, then only that
# path's options; no tabs, no settings page. Set uiV3=false to roll back to
# the v2 tab menu (ui=classic still restores the original menu below that).
uiV3=true
# Steam networking: offers a Steam connection mode (friends-only lobby, overlay
# invites, Valve relay). Requires the Steam build of the game on both computers.
steamNetworking=true
# Authenticated Direct/IP transport: one-time session code in the multiplayer UI,
# endpoint pinning, UDP replay rejection, and authenticated TCP save/control records.
# Disable on both peers for an immediate rollback to the legacy Direct transport.
directTransportSecurityV1=true
snapshotHz=12
fullResyncSeconds=45
interpolationMs=150
# Experimental host-authored movement/work presentation. False keeps the legacy path.
semanticAgentPresentation=true
semanticAnimalPresentationV2=true
semanticWorkCycleDriver=true
# Event-driven production registry/scheduler. Sub-gates below remain independently reversible.
productionStateV2=true
productionTicketOrdersV2=true
# Test gate: host streams visible production-ticket progress to the client.
workstationRuntimePresentation=true
hostSleepPresentationV2=true
sendSnapshots=true
applySnapshots=false
suppressClientSimulation=false
actionPhaseReplication=true
actionPhaseVisualReplay=true
actionParameterReplication=true
nativeAnimationControllerReplay=true
actionAnimatorStateSampling=true
forceHostMovement=true
animateReplicatedMovement=true
logSnapshots=false
# Transactional placement plus sparse event-driven building lifecycle updates.
# Set false on both peers to compare against the legacy whole-building snapshot lane.
buildingReplicationV2=true
# Event-driven authoritative material inventory for unfinished buildings.
buildingConstructionMaterialsV2=true
# Exact semantic building lanes. Disable any lane on both peers to restore the
# prior fail-closed behavior for that category.
beamPlacementReplication=true
beamLifecycleReplication=true
socketablePlacementReplication=true
cropfieldSpatialReplicationV1=true
# Host-authoritative cropfield menu policies (type, sowing, priority, dates,
# harvest/cut phases, and Paste). Disable on both peers for rollback.
cropfieldPolicyV1=true
# Focused cropfield capture/rejection tracing. Functional replication remains on.
cropfieldPolicyDiagnostics=false
plantLifecycleReplication=true
# Focused native endpoint/replay trace for the current beam test.
beamReplicationDiagnostics=true
worldObjectDeltaDiagnostics=false
verboseReplicationLogging=false
# Optional 10-second FPS summaries. Disabled while trader testing is isolated.
perfFpsProbe=false
validateSnapshots=true
snapshotValidationSeconds=10
resultLifecycleProbes=false
animationDiagnostics=false
characterStateDiagnostics=false
carryDiagnostics=false
goapActionProbe=false
goapActionProbeEntityId=
resourcePileStateSnapshots=true
resourceContainerReplication=true
worldObjectDeltaMode=apply
worldObjectDeltaApplyBudgetPerFrame=12
worldObjectDeltaApplyQueueMax=2048
worldObjectDeltaApplyBudgetMsPerFrame=8
maxSnapshotEntities=128
sendProofIntent=false
commandCaptureMode=send
regionCommandMode=send

# Combat replication layers are independently reversible. Presentation uses
# ordered charge, release, and end events. Diagnostics are off by default.
combatReplication=true
combatDraftCommands=true
combatAttackCommands=true
combatStateReplication=true
combatHealthReplication=true
combatHealthDetailReplication=true
combatDeathReplication=true
combatPresentationReplication=true
combatProjectileReplication=false
combatExternalAgentLifecycle=false
combatDiagnostics=false

# Experimental event/weather foundation test. Scripted event and weather
# scheduler authority remain off until external rosters and environment
# mutations have authoritative replication.
eventReplication=true
eventSchedulerAuthority=false
eventTraderAuthority=true
synchronizedTrading=true
eventLifecycleReplication=true
eventDialogReplication=true
eventChoiceCommands=true
eventSpeedReplication=true
eventWarningReplication=false
eventNoticeReplication=false
eventExternalAgentLifecycle=false
eventEnvironmentMutationReplication=false
playerTriggeredEventReplication=false
weatherReplication=true
weatherSchedulerAuthority=false
weatherTemperatureReplication=true
eventDiagnostics=true
# Focused merchant party Begin/Chunk/Commit and ACK tracing. This does not
# enable global verbose transport logs.
traderTransferDiagnostics=true
